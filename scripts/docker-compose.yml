services:
  db:
    container_name: codemap-db
    image: pgvector/pgvector:pg17
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-codemap}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-codemap}
      POSTGRES_DB: ${DB_NAME:-codemap}
      TZ: Asia/Seoul
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - codemap-db-volume:/var/lib/postgresql/data
    command: postgres -c max_connections=500
    networks:
      - codemap-net

volumes:
  codemap-db-volume:

networks:
  codemap-net:
    name: codemap-net
