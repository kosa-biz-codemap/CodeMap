name: CodeMap Backend Deploy (CI/CD)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  # 1. 깃허브 로봇 공장에서 도커 이미지를 굽고 도커 허브(창고)에 올리는 작업
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/codemap-backend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/codemap-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/codemap-backend:buildcache,mode=max

  # 2. 깃허브 로봇이 구글 서버(VM)에 원격 접속해서 도커를 껐다 켜는 작업
  deploy-to-gcp:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Execute remote SSH commands to deploy
        uses: 'google-github-actions/ssh-compute@v1'
        with:
          instance_name: 'codemap-backend-vm'
          zone: 'asia-northeast3-a' # GCP 존이 다르다면 알맞게 수정해주세요.
          command: |
            cd ~/CodeMap/backend

            echo "1. 새 이미지를 도커 허브에서 다운로드합니다."
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/codemap-backend:latest

            echo "2. 기존에 돌아가던 백엔드 컨테이너를 중지하고 삭제합니다."
            sudo docker rm -f backend_app || true

            echo "3. 새 버전의 이미지로 컨테이너를 다시 실행합니다. (동적 스냅샷 볼륨 마운트)"
            cd ~/CodeMap/backend
            CLONE_PATH=""
            if [ -f .env ]; then
              CLONE_PATH=$(grep -w CLONE_BASE_DIR .env | cut -d '=' -f2 | tr -d '\r' | xargs 2>/dev/null || true)
              if [ -z "$CLONE_PATH" ]; then
                OS_TYPE=$(uname -s 2>/dev/null || echo "Linux")
                if [[ "$OS_TYPE" == *"NT"* ]] || [[ "$OS_TYPE" == *"MINGW"* ]] || [[ "$OS_TYPE" == *"MSYS"* ]]; then
                  CLONE_PATH=$(grep -w CLONE_BASE_DIR_WINDOWS .env | cut -d '=' -f2 | tr -d '\r' | xargs 2>/dev/null || true)
                else
                  CLONE_PATH=$(grep -w CLONE_BASE_DIR_UNIX .env | cut -d '=' -f2 | tr -d '\r' | xargs 2>/dev/null || true)
                fi
              fi
            fi
            if [ -z "$CLONE_PATH" ]; then
              OS_TYPE=$(uname -s 2>/dev/null || echo "Linux")
              if [[ "$OS_TYPE" == *"NT"* ]] || [[ "$OS_TYPE" == *"MINGW"* ]] || [[ "$OS_TYPE" == *"MSYS"* ]]; then
                CLONE_PATH="C:/temp/codemap/jobs"
              else
                CLONE_PATH="/tmp/codemap/jobs"
              fi
            fi
            echo "스냅샷 볼륨 매핑 경로: $CLONE_PATH"
            sudo docker run -d -p 8000:8000 -v "$CLONE_PATH:$CLONE_PATH" --name backend_app --env-file .env ${{ secrets.DOCKERHUB_USERNAME }}/codemap-backend:latest

            echo "4. 불필요한 옛날 도커 찌꺼기들을 청소합니다."
            sudo docker image prune -f
            
            echo "배포가 성공적으로 완료되었습니다!"
