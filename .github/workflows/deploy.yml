name: CodeMap Backend Deploy (CI/CD)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'database/**'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/codemap-backend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/codemap-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/codemap-backend:buildcache,mode=max

  # 1. 동적 Matrix 준비 (CLOUD_PROVIDER_LIST 쉼표 구분자 파싱)
  setup-matrix:
    needs: build-and-push
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        env:
          PROVIDER_LIST: ${{ secrets.CLOUD_PROVIDER_LIST }}
        run: |
          python3 -c "
          import json, os
          raw = os.environ.get('PROVIDER_LIST', '').strip()
          providers = [p.strip() for p in raw.split(',') if p.strip()]
          matrix_json = json.dumps({'cloud': providers})
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'matrix={matrix_json}\n')
          "

  # 2. 1차 시도: 동적 클라우드 Matrix 병렬 배포
  deploy-to-cloud:
    needs: [build-and-push, setup-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    steps:
      # === 1. GCP Provider ===
      - id: auth-gcp
        name: Authenticate to GCP
        if: matrix.cloud == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCREDENTIALS }}'

      - name: Execute remote SSH on GCP Compute Engine
        if: matrix.cloud == 'gcp'
        uses: google-github-actions/ssh-compute@v2
        with:
          instance_name: '${{ secrets.INSTANCE_NAME }}'
          zone: '${{ secrets.ZONE }}'
          ssh_private_key: '${{ secrets.SSH_PRIVATE_KEY }}'
          command: |
            set -e

            cd "${{ secrets.SSH_HOME_DIR }}"
            git fetch origin main
            git checkout origin/main -- scripts/deploy_backend.sh scripts/init_db.sh scripts/docker-compose.yml database/init.sql
            chmod +x scripts/deploy_backend.sh scripts/init_db.sh
            sudo env BACKEND_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/codemap-backend:latest" CLOUD_PROVIDER="${{ matrix.cloud }}" INGRESS_MODE="${{ secrets.INGRESS_MODE }}" PUBLIC_BACKEND_URL="${{ secrets.PUBLIC_BACKEND_URL }}" INGRESS_CHECK_REQUIRED="${{ secrets.INGRESS_CHECK_REQUIRED }}" bash scripts/deploy_backend.sh

      # === 2. AWS Provider ===
      - name: Authenticate to AWS
        if: matrix.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.ZONE }}

      - name: Execute Remote Command on AWS EC2 via SSM
        if: matrix.cloud == 'aws'
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.INSTANCE_NAME }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd ${{ secrets.SSH_HOME_DIR }}",
              "git fetch origin main",
              "git checkout origin/main -- scripts/deploy_backend.sh scripts/init_db.sh scripts/docker-compose.yml database/init.sql",
              "chmod +x scripts/deploy_backend.sh scripts/init_db.sh",
              "sudo env BACKEND_IMAGE=\"${{ secrets.DOCKERHUB_USERNAME }}/codemap-backend:latest\" CLOUD_PROVIDER=\"${{ matrix.cloud }}\" INGRESS_MODE=\"${{ secrets.INGRESS_MODE }}\" PUBLIC_BACKEND_URL=\"${{ secrets.PUBLIC_BACKEND_URL }}\" INGRESS_CHECK_REQUIRED=\"${{ secrets.INGRESS_CHECK_REQUIRED }}\" bash scripts/deploy_backend.sh"
            ]'

      # === 3. Azure Provider ===
      - name: Authenticate to Azure
        if: matrix.cloud == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Execute Remote Command on Azure VM
        if: matrix.cloud == 'azure'
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az vm run-command invoke \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${{ secrets.INSTANCE_NAME }}" \
              --command-id RunShellScript \
              --scripts \
                "cd ${{ secrets.SSH_HOME_DIR }}" \
                "git fetch origin main" \
                "git checkout origin/main -- scripts/deploy_backend.sh scripts/init_db.sh scripts/docker-compose.yml database/init.sql" \
                "chmod +x scripts/deploy_backend.sh scripts/init_db.sh" \
                "sudo env BACKEND_IMAGE='${{ secrets.DOCKERHUB_USERNAME }}/codemap-backend:latest' CLOUD_PROVIDER='${{ matrix.cloud }}' INGRESS_MODE='${{ secrets.INGRESS_MODE }}' PUBLIC_BACKEND_URL='${{ secrets.PUBLIC_BACKEND_URL }}' INGRESS_CHECK_REQUIRED='${{ secrets.INGRESS_CHECK_REQUIRED }}' bash scripts/deploy_backend.sh"

  # 2차 폴백: 클라우드 배포가 실패했을 때만 일반 SSH로 재시도
  deploy-via-ssh-fallback:
    needs: [build-and-push, deploy-to-cloud]
    if: always() && needs.deploy-to-cloud.result == 'failure'
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_HOME_DIR: ${{ secrets.SSH_HOME_DIR }}
      BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/codemap-backend:latest
    steps:
      - name: Set up deploy-only SSH private key
        run: |
          mkdir -p ~/.ssh
          install -m 600 -D /dev/null ~/.ssh/id_deploy
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Pin known host (MITM 방지, ssh-keyscan으로 미리 받아둔 값)
        run: |
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOST }}" >> ~/.ssh/known_hosts

      - name: Detect remote OS
        id: detect_os
        run: |
          set +e
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" "uname -s"
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -eq 0 ]; then
            echo "감지 결과: Unix 계열 (uname 성공)"
          else
            echo "감지 결과: Windows 추정 (uname 실패, exit=$exit_code)"
          fi

      - name: Deploy via plain SSH (Linux/Unix)
        if: steps.detect_os.outputs.exit_code == '0'
        run: |
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" "
            set -e
            cd '$SSH_HOME_DIR'
            git fetch origin main
            git checkout origin/main -- scripts/deploy_backend.sh scripts/init_db.sh scripts/docker-compose.yml database/init.sql
            chmod +x scripts/deploy_backend.sh scripts/init_db.sh
            sudo env \
              BACKEND_IMAGE='$BACKEND_IMAGE' \
              CLOUD_PROVIDER='${{ secrets.CLOUD_PROVIDER }}' \
              INGRESS_MODE='${{ secrets.INGRESS_MODE }}' \
              PUBLIC_BACKEND_URL='${{ secrets.PUBLIC_BACKEND_URL }}' \
              INGRESS_CHECK_REQUIRED='${{ secrets.INGRESS_CHECK_REQUIRED }}' \
              bash scripts/deploy_backend.sh
          "

      - name: Deploy via plain SSH (Windows)
        if: steps.detect_os.outputs.exit_code != '0'
        run: |
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" "powershell -NoProfile -Command \"
            Set-Location -Path '$SSH_HOME_DIR';
            git fetch origin main;
            git checkout origin/main -- scripts/deploy_backend.ps1 scripts/init_db.ps1 scripts/docker-compose.yml database/init.sql;
            \$env:BACKEND_IMAGE = '$BACKEND_IMAGE';
            \$env:CLOUD_PROVIDER = '${{ secrets.CLOUD_PROVIDER }}';
            \$env:INGRESS_MODE = '${{ secrets.INGRESS_MODE }}';
            \$env:PUBLIC_BACKEND_URL = '${{ secrets.PUBLIC_BACKEND_URL }}';
            \$env:INGRESS_CHECK_REQUIRED = '${{ secrets.INGRESS_CHECK_REQUIRED }}';
            powershell -ExecutionPolicy Bypass -File scripts\\deploy_backend.ps1
          \""

  # 둘 다 실패하면 워크플로우 자체를 최종 실패로 표시
  check-deploy-result:
    needs: [deploy-to-cloud, deploy-via-ssh-fallback]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if both deploy paths failed
        run: |
          cloud_result="${{ needs.deploy-to-cloud.result }}"
          ssh_result="${{ needs.deploy-via-ssh-fallback.result }}"
          echo "Primary Cloud result: $cloud_result"
          echo "SSH fallback result: $ssh_result"
          if [ "$cloud_result" != "success" ] && [ "$ssh_result" != "success" ]; then
            echo "Both Primary Cloud and SSH fallback deployments failed."
            exit 1
          fi
          echo "Deployment succeeded via at least one path."