name: CodeMap Backend Deploy (CI/CD)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'database/**'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/codemap-backend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/codemap-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/codemap-backend:buildcache,mode=max

  # 1차 시도: GCP
  deploy-to-gcp:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Execute remote SSH commands to deploy
        uses: google-github-actions/ssh-compute@v2
        with:
          instance_name: codemap-backend-vm
          zone: asia-northeast3-a
          command: |
            set -e

            cd ~/CodeMap
            git fetch origin main
            git checkout origin/main -- scripts/deploy_backend.sh scripts/init_db.sh scripts/docker-compose.yml database/init.sql
            chmod +x scripts/deploy_backend.sh scripts/init_db.sh
            sudo env \
              BACKEND_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/codemap-backend:latest" \
              CLOUD_PROVIDER="${{ vars.CLOUD_PROVIDER || 'gcp' }}" \
              INGRESS_MODE="${{ vars.INGRESS_MODE || 'direct' }}" \
              PUBLIC_BACKEND_URL="${{ vars.PUBLIC_BACKEND_URL }}" \
              INGRESS_CHECK_REQUIRED="${{ vars.INGRESS_CHECK_REQUIRED || 'false' }}" \
              bash scripts/deploy_backend.sh

  # 2차 폴백: GCP 배포가 실패했을 때만 일반 SSH로 재시도
  deploy-via-ssh-fallback:
    needs: [build-and-push, deploy-to-gcp]
    if: always() && needs.deploy-to-gcp.result == 'failure'
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_HOME_DIR: ${{ secrets.SSH_HOME_DIR }}
      BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/codemap-backend:latest
    steps:
      - name: Set up deploy-only SSH private key
        run: |
          mkdir -p ~/.ssh
          install -m 600 -D /dev/null ~/.ssh/id_deploy
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Pin known host (MITM 방지, ssh-keyscan으로 미리 받아둔 값)
        run: |
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOST }}" >> ~/.ssh/known_hosts

      - name: Detect remote OS
        id: detect_os
        run: |
          set +e
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" "uname -s"
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -eq 0 ]; then
            echo "감지 결과: Unix 계열 (uname 성공)"
          else
            echo "감지 결과: Windows 추정 (uname 실패, exit=$exit_code)"
          fi

      - name: Deploy via plain SSH (Linux/Unix)
        if: steps.detect_os.outputs.exit_code == '0'
        run: |
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" "
            set -e
            cd '$SSH_HOME_DIR'
            git fetch origin main
            git checkout origin/main -- scripts/deploy_backend.sh scripts/init_db.sh scripts/docker-compose.yml database/init.sql
            chmod +x scripts/deploy_backend.sh scripts/init_db.sh
            sudo env \
              BACKEND_IMAGE='$BACKEND_IMAGE' \
              CLOUD_PROVIDER='${{ vars.CLOUD_PROVIDER || 'generic' }}' \
              INGRESS_MODE='${{ vars.INGRESS_MODE || 'direct' }}' \
              PUBLIC_BACKEND_URL='${{ vars.PUBLIC_BACKEND_URL }}' \
              INGRESS_CHECK_REQUIRED='${{ vars.INGRESS_CHECK_REQUIRED || 'false' }}' \
              bash scripts/deploy_backend.sh
          "

      - name: Deploy via plain SSH (Windows)
        if: steps.detect_os.outputs.exit_code != '0'
        run: |
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" "powershell -NoProfile -Command \"
            Set-Location -Path '$SSH_HOME_DIR';
            git fetch origin main;
            git checkout origin/main -- scripts/deploy_backend.ps1 scripts/init_db.ps1 scripts/docker-compose.yml database/init.sql;
            \$env:BACKEND_IMAGE = '$BACKEND_IMAGE';
            \$env:CLOUD_PROVIDER = '${{ vars.CLOUD_PROVIDER || 'generic' }}';
            \$env:INGRESS_MODE = '${{ vars.INGRESS_MODE || 'direct' }}';
            \$env:PUBLIC_BACKEND_URL = '${{ vars.PUBLIC_BACKEND_URL }}';
            \$env:INGRESS_CHECK_REQUIRED = '${{ vars.INGRESS_CHECK_REQUIRED || 'false' }}';
            powershell -ExecutionPolicy Bypass -File scripts\\deploy_backend.ps1
          \""

  # 둘 다 실패하면 워크플로우 자체를 최종 실패로 표시
  check-deploy-result:
    needs: [deploy-to-gcp, deploy-via-ssh-fallback]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if both deploy paths failed
        run: |
          gcp_result="${{ needs.deploy-to-gcp.result }}"
          ssh_result="${{ needs.deploy-via-ssh-fallback.result }}"
          echo "GCP result: $gcp_result"
          echo "SSH fallback result: $ssh_result"
          if [ "$gcp_result" != "success" ] && [ "$ssh_result" != "success" ]; then
            echo "Both GCP and SSH fallback deployments failed."
            exit 1
          fi
          echo "Deployment succeeded via at least one path."