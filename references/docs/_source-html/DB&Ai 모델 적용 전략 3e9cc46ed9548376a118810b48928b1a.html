</style></head><body><article id="3e9cc46e-d954-8376-a118-810b48928b1a" class="page sans"><header><div class="page-header-icon undefined"><span class="icon">🧠</span></div><h1 class="page-title" dir="auto">DB&amp;Ai 모델 적용 전략</h1><p class="page-description" dir="auto"></p></header><div class="page-body"><div style="display:contents" dir="auto"><hr id="5c3cc46e-d954-82c1-88ed-01153bc2dd93"/></div><div style="display:contents" dir="ltr"><figure class="block-color-default callout" style="white-space:pre-wrap;display:flex" id="379cc46e-d954-8335-bdc3-81361bdab7cf"><div style="font-size:1.5em"><span class="icon">🗄️</span></div><div style="width:100%"><div style="display:contents" dir="auto"><details open=""><summary style="font-weight:600;font-size:1.875em;line-height:1.3;margin:0"> 데이터베이스 및 청킹 전략 (DB &amp; Chunking)</summary><div class="indented"><div style="display:contents" dir="auto"><h3 id="f72cc46e-d954-8203-9a29-811d04cb8dd8" class="">1. 정적 RAG와 Agentic CAG의 결합</h3></div><div style="display:contents" dir="auto"><p id="f23cc46e-d954-8354-8212-0186680b71ef" class="">전통적인 RAG의 문맥 파편화 단점을 보완하기 위해, 메인 LLM과 임베딩 모델을 쌍으로 구성하고 에이전트가 직접 탐색(도구 호출)하는 하이브리드 RAG를 채택합니다.</p></div><div style="display:contents" dir="auto"><h3 id="bdacc46e-d954-83e3-84b0-816f08f0130e" class="">2. 계층적 트리 RAG (Tree-Based RAG)</h3></div><div style="display:contents" dir="auto"><p id="2f6cc46e-d954-83be-be19-814d6fa2d2ea" class="">개별 최하위 파일의 텍스트를 임베딩하고, 상위 디렉토리는 하위 텍스트들을 묶어 구조화 프롬프트로 &#x27;요약본&#x27;을 추출한 뒤 그 요약본을 임베딩(Bottom-up)하여 넓은 범위 문맥에 대응합니다.</p></div><div style="display:contents" dir="auto"><h3 id="ac3cc46e-d954-8214-ba75-019309148de0" class="">3. PostgreSQL 기반 의존성 스키마 (pgvector)</h3></div><div style="display:contents" dir="auto"><p id="90acc46e-d954-8266-8775-01eb3b194148" class="">폴더 구조를 무시하는 코드 참조 관계를 DB에 올바르게 기록합니다. 의존성 관계는 벡터가 아닌 <strong>문자열 배열(Array)</strong> 메타데이터로 저장하여 PostgreSQL의 <code>JOIN</code>과 재귀 쿼리(<code>WITH RECURSIVE</code>)를 통해 방사형 지식 그래프를 구성합니다.</p></div><div style="display:contents" dir="auto"><h3 id="d05cc46e-d954-8330-8c04-8199ab093bff" class="">4. AST 기반 의미론적 코드 청킹 (Semantic Chunking)</h3></div><div style="display:contents" dir="auto"><p id="7c4cc46e-d954-836f-8405-015f1228cff7" class="">기본 분할(문자 수 기준)의 한계를 극복하고, 코드는 함수/클래스/라우터 단위로 분할하여 파일 경로 및 함수명 등의 메타데이터를 함께 저장합니다.</p></div></div></details></div></div></figure></div><div style="display:contents" dir="ltr"><figure class="block-color-default callout" style="white-space:pre-wrap;display:flex" id="0eccc46e-d954-830a-ae60-810e7151210a"><div style="font-size:1.5em"><span class="icon">🧠</span></div><div style="width:100%"><div style="display:contents" dir="auto"><details open=""><summary style="font-weight:600;font-size:1.875em;line-height:1.3;margin:0"> AI 모델 적용 전략 (Model Selection Strategy)</summary><div class="indented"><div style="display:contents" dir="auto"><h3 id="83fcc46e-d954-82f7-8cbd-8176547c686e" class="">1. 메인 에이전트 모델: <code>gpt-4o</code></h3></div><div style="display:contents" dir="auto"><ul id="e20cc46e-d954-8285-879c-81f56eb75a9e" class="bulleted-list"><li style="list-style-type:disc"><strong>역할</strong>: Agentic Search 및 판단 로직, 자가 교정(Self-Correction) 등 메인 Brain 역할.</li></ul></div><div style="display:contents" dir="auto"><ul id="030cc46e-d954-82b7-801c-81b706a4bd31" class="bulleted-list"><li style="list-style-type:disc"><strong>채택 근거</strong>: 다중 도구 호출(Parallel Tool Calling) 최적화와 복잡한 의존성 구조를 해석하는 최상위권의 다단계 추론(Multi-step Reasoning) 점수를 갖춤.</li></ul></div><div style="display:contents" dir="auto"><h3 id="a6dcc46e-d954-8344-aa93-0179bc98c544" class="">2. 코드 임베딩 모델: <code>text-embedding-3-large</code></h3></div><div style="display:contents" dir="auto"><ul id="88ecc46e-d954-823e-9ac8-81d8841ae2dd" class="bulleted-list"><li style="list-style-type:disc"><strong>역할</strong>: 코드와 문서를 수학적 벡터 공간으로 변환 및 RAG 구축.</li></ul></div><div style="display:contents" dir="auto"><ul id="2fdcc46e-d954-82f7-93bd-013aa6be4a8c" class="bulleted-list"><li style="list-style-type:disc"><strong>채택 근거</strong>: 다국어 정보 검색 평가(MIRACL)에서 압도적 점수를 기록하여 한글 주석과 영문 소스코드가 혼재된 환경에 최적. 차원을 축소해도 성능이 유지되는 마트료시카 표현 학습 지원.</li></ul></div><div style="display:contents" dir="auto"><h3 id="3cbcc46e-d954-8275-9770-812a9a9e63d4" class="">3. 하이브리드 병행 모델: <code>gpt-4o-mini</code></h3></div><div style="display:contents" dir="auto"><ul id="6b7cc46e-d954-83ac-a6ea-819b1ff6de30" class="bulleted-list"><li style="list-style-type:disc"><strong>역할</strong>: Map-Reduce 요약 파이프라인 및 초기 데이터 전처리.</li></ul></div><div style="display:contents" dir="auto"><ul id="6c9cc46e-d954-828e-8b28-01a2db353e24" class="bulleted-list"><li style="list-style-type:disc"><strong>채택 근거</strong>: 엄청난 텍스트 양을 읽어야 하는 문서화 단계에서 발생할 막대한 API 비용을 절감. (GPT-4o 대비 입력 기준 약 33배 저렴) 비용 대비 뛰어난 인지 능력(MMLU 82.0%)으로 고품질 요약 보장.</li></ul></div></div></details></div></div></figure></div><div style="display:contents" dir="auto"><p id="19ccc46e-d954-825c-a840-018113c2e51c" class="">
</p></div></div></article><span class="sans" style="font-size:14px;padding-top:2em"></span></body></html>
